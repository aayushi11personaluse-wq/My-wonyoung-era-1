<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wonyoung Era</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<button id="darkModeToggle">🌙 Dark Mode</button>
    <div class="container">

        <h1>🌸 My Wonyoung Era</h1>

        <p class="subtitle">
            build habits • glow up gently • stay consistent
        </p>
<div class="card">

    <h2>🌸 Today’s Habits</h2>

    <div class="habits">
        <label><input type="checkbox" class="habit"> Drink water 💧</label>
        <label><input type="checkbox" class="habit"> Study 30 min 📚</label>
        <label><input type="checkbox" class="habit"> Skincare ✨</label>
        <label><input type="checkbox" class="habit"> Move your body 🧘</label>
    </div>

    <p class="small-text">Your progress saves automatically 🌷</p>

</div>
        
    </div>
<hr style="margin: 20px 0; border: 1px solid #f3f3f3;">

<h2>💧 Water Tracker</h2>

<div class="water">
    <p id="waterCount">0 / 8 cups</p>

    <div class="water-buttons">
        <button id="addWater">+ Add Cup</button>
        <button id="resetWater">Reset</button>
    </div>
</div>
<hr style="margin: 20px 0; border: 1px solid #f3f3f3;">

<h2>⏱️ Focus Timer</h2>

<div class="timer">

    <p id="time">25:00</p>

    <div class="timer-buttons">
        <button id="startTimer">Start</button>
        <button id="pauseTimer">Pause</button>
        <button id="resetTimer">Reset</button>
    </div>

</div>
    <hr style="margin: 20px 0; border: 1px solid #f3f3f3;">

<h2>📊 Daily Streak</h2>

<div class="streak">

    <p id="streakText">🔥 0 day streak</p>

    <button id="completeDay">Mark Today Complete</button>

</div>
    <script src="script.js"></script>

</body>
</html>
